name: Release Verification

# Release assets are built, Developer ID signed, notarized, and uploaded by
# scripts/publish-local-release.sh before the release tag is pushed. The local
# script explicitly dispatches this workflow after the draft release asset
# exists, so tag pushes do not implicitly build unsigned release assets.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to verify
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-verification-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  package-tests:
    name: Package Tests
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify release ref
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_VERSION}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3." >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "${RELEASE_VERSION}" ]]; then
            echo "Release verification must be dispatched against the release tag ref." >&2
            echo "Expected tag: ${RELEASE_VERSION}" >&2
            echo "Actual ref: ${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Resolve latest stable Xcode
        run: |
          xcode_app="$(ruby <<'RUBY'
          xcode_major = "26"
          candidates = Dir["/Applications/Xcode_#{xcode_major}*.app"].select { |path| File.directory?(path) }

          def pre_release_xcode_path?(path)
            labels = [path, File.realpath(path)].map { |candidate| File.basename(candidate).downcase }
            labels.any? do |label|
              label.match?(/beta|release[ _-]?candidate|(?:^|[_. -])rc(?:$|[_. -])/)
            end
          end

          candidates = candidates.reject do |path|
            pre_release_xcode_path?(path)
          end

          def version_components(path)
            version = File.basename(path)[/Xcode_(\d+(?:\.\d+)*)/, 1]
            version.to_s.split(".").map(&:to_i)
          end

          selected = candidates.max_by { |path| version_components(path) }
          abort("No stable Xcode #{xcode_major} installation found") unless selected
          puts selected
          RUBY
          )"
          echo "DEVELOPER_DIR=${xcode_app}/Contents/Developer" >> "$GITHUB_ENV"
          echo "Resolved Xcode: ${xcode_app}"

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Run Swift package tests
        run: swift test --build-system swiftbuild --no-parallel

      - name: Run monitor app tests
        run: |
          xcodebuild test \
            -project Tools/ReviewMonitor/CodexReviewMonitor.xcodeproj \
            -scheme CodexReviewMonitor \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  publish-release:
    name: Publish Verified Release
    needs: package-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Verify release ref
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_VERSION}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3." >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "${RELEASE_VERSION}" ]]; then
            echo "Release publishing must be dispatched against the release tag ref." >&2
            echo "Expected tag: ${RELEASE_VERSION}" >&2
            echo "Actual ref: ${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Publish verified draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          tag_name="$(gh release view "${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}" --json tagName --jq '.tagName')"
          if [[ "${tag_name}" != "${RELEASE_VERSION}" ]]; then
            echo "Release tag mismatch." >&2
            echo "Expected tag: ${RELEASE_VERSION}" >&2
            echo "Actual tag:   ${tag_name}" >&2
            exit 1
          fi

          expected_asset="CodexReviewMonitor_${RELEASE_VERSION#v}.dmg"
          asset_state="$(
            EXPECTED_ASSET="${expected_asset}" \
              gh release view "${RELEASE_VERSION}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets[] | select(.name == env.EXPECTED_ASSET) | .state' \
              | head -n 1
          )"
          if [[ "${asset_state}" != "uploaded" ]]; then
            echo "Expected uploaded release asset was not found: ${expected_asset}" >&2
            exit 1
          fi

          is_draft="$(gh release view "${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft')"
          is_prerelease="$(gh release view "${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease --jq '.isPrerelease')"
          if [[ "${is_draft}" != "true" ]]; then
            if [[ "${is_prerelease}" == "false" ]]; then
              echo "Release ${RELEASE_VERSION} is already published."
              exit 0
            fi
            echo "Release ${RELEASE_VERSION} is already public but marked as a prerelease." >&2
            exit 1
          fi

          gh release edit "${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease=false
